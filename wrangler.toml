# Cloudflare Worker configuration for the Pebble Sports backend.
#
# Two things this file does:
#   1. Binds the KV namespace where registered watches + pin snapshots
#      are stored (replaces the file-based sports-users.json).
#   2. Sets the Cron Trigger that fires the scheduled() handler every
#      2 minutes — this is what pushes timeline pins to your watch
#      without the app being open.

name = "pebble-sports-worker"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Observability — keep logs visible in the dashboard for debugging.
[observability]
enabled = true
head_sampling_rate = 1

# Cron Trigger: fire scheduled() every 2 minutes (UTC).
# The handler itself skips ESPN polling during the quiet UTC window
# 08:00–11:59 (4am–8am ET, 1am–5am PT) to save calls.
[triggers]
crons = ["*/2 * * * *"]

# KV namespace — replaces data/sports-users.json.
[[kv_namespaces]]
binding = "SPORTS_KV"
id = "35b8a9af431c46398eab5ed4ba1c9d4b"
